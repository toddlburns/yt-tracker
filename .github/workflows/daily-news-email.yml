name: Daily Music News Email

on:
  schedule:
    # Noon PST = 8pm UTC
    - cron: '0 20 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news and send email
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ADDRESS: todd.burns@gmail.com
        run: python .github/scripts/daily_music_news_email.py
