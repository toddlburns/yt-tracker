name: Newsletter Briefing

on:
  schedule:
    # 7:00 AM PST = 3:00 PM UTC, every day
    - cron: '0 15 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Summarize newsletters and send briefing
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_ADDRESS: todd.burns@gmail.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/newsletter_briefing.py
